type User {
  id:    Int!
  name:  String!
  email: String!
  code:  String!
}

input NewUserInput {
  name:  String!
  email: String!
}

input EditUserInput {
  id:    Int!
  name:  String
  email: String
}

type Query {
  users: [User!]!
}

type Mutation {
  editUser(input: EditUserInput!): User!
  saveNewUser(input: NewUserInput!): User!
}
